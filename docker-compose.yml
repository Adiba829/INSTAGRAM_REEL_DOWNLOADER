version: "3.9"

services:
  api:
    build: .
    container_name: instagram-reel-downloader
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - ALLOWED_ORIGINS=*
      - MAX_FILE_SIZE_MB=500
      - DOWNLOAD_TIMEOUT=120
    volumes:
      - ./downloads:/app/downloads   # Persist downloads on host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
